<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome CDN (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
    }

    .navbar { background-color: #0f0f0f; border-bottom: 1px solid #303030; }
    .search-bar {
      background: #121212;
      border: 1px solid #303030;
      color: #fff;
    }
    .search-bar:focus {
      background: #121212;
      color: #fff;
      box-shadow: 0 0 0 2px #065fd4;
    }

    .video-card {
      transition: all 0.2s;
    }
    .video-card:hover {
      transform: translateY(-4px);
    }

    .thumbnail {
      width: 100%;
      height: 157px;
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .offcanvas {
      background-color: #0f0f0f;
      color: #fff;
      width: 260px !important;
    }

    .sidebar-item {
      padding: 12px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 14px;
    }

    .sidebar-item:hover {
      background-color: #272727;
    }

    .sidebar-item.active {
      background-color: #272727;
      font-weight: 500;
    }

    .section-title {
      padding: 8px 24px 4px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <div class="d-flex align-items-center gap-3">
        <button class="btn text-white fs-4" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="d-flex align-items-center gap-1 text-danger fs-4 fw-bold">
          <i class="fa-brands fa-youtube"></i> YouTube
        </div>
      </div>

      <div class="d-flex flex-grow-1 justify-content-center mx-4" style="max-width: 640px;">
        <div class="input-group">
          <input type="text" id="searchInput" class="form-control search-bar rounded-start-pill" placeholder="Search">
          <button id="searchBtn" class="btn btn-outline-secondary border-start-0 rounded-end-pill px-4">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
        <button id="micBtn" class="btn btn-outline-secondary ms-2 rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
          <i class="fa-solid fa-microphone"></i>
        </button>
      </div>

      <div class="d-flex align-items-center gap-4 text-white fs-4">
        <i class="fa-solid fa-video"></i>
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-user-circle fs-3"></i>
      </div>
    </div>
  </nav>

  <!-- Welcome -->
  <div id="welcome" class="text-center py-2 bg-dark border-bottom" style="margin-top: 56px;">
    Welcome to YouTube, <strong id="userNameDisplay"></strong>!
  </div>

  <!-- Sidebar Offcanvas -->
  <div class="offcanvas offcanvas-start" id="sidebarOffcanvas">
    <div class="offcanvas-body p-0">
      <div class="sidebar-item active"><i class="fa-solid fa-house"></i> Home</div>
      <div class="sidebar-item"><i class="fa-solid fa-bolt"></i> Shorts</div>
      <div class="sidebar-item"><i class="fa-solid fa-play"></i> Subscriptions</div>
      
      <hr class="border-secondary mx-3">
      
      <div class="sidebar-item"><i class="fa-solid fa-user"></i> You</div>
      <div class="sidebar-item"><i class="fa-solid fa-clock-rotate-left"></i> History</div>
      <div class="sidebar-item"><i class="fa-solid fa-list"></i> Playlists</div>
      <div class="sidebar-item"><i class="fa-solid fa-clock"></i> Watch Later</div>
      <div class="sidebar-item"><i class="fa-solid fa-thumbs-up"></i> Liked Videos</div>
      <div class="sidebar-item"><i class="fa-solid fa-download"></i> Downloads</div>
      
      <hr class="border-secondary mx-3">
      
      <div class="section-title">Explore</div>
      <div class="sidebar-item"><i class="fa-solid fa-music"></i> Music</div>
      <div class="sidebar-item"><i class="fa-solid fa-gamepad"></i> Gaming</div>
      <div class="sidebar-item"><i class="fa-solid fa-newspaper"></i> News</div>
      <div class="sidebar-item"><i class="fa-solid fa-trophy"></i> Sports</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container-fluid mt-4" style="margin-left: 20px;">
    <div class="row g-4" id="videoGrid">
      <!-- Videos added by JavaScript -->
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    var userName = "";

    const videos = [
      { id: 1, title: "The Future of AI in 2026", channel: "Tech Insider", views: "1.2M views", time: "2 days ago", thumbnail: "https://picsum.photos/id/1015/320/180", duration: "12:45", youtubeId: "dQw4w9wgxcq" },
      { id: 2, title: "Building a YouTube Clone from Scratch", channel: "Web Dev Simplified", views: "892K views", time: "1 week ago", thumbnail: "https://picsum.photos/id/201/320/180", duration: "28:10", youtubeId: "3JZ_D3ELwOQ" },
      { id: 3, title: "Why You Should Learn JavaScript in 2026", channel: "freeCodeCamp", views: "2.1M views", time: "3 days ago", thumbnail: "https://picsum.photos/id/237/320/180", duration: "45:22", youtubeId: "PkZNo7MFNFg" },
      { id: 4, title: "Karachi Street Food Tour 2026", channel: "Food With Ahad", views: "456K views", time: "5 hours ago", thumbnail: "https://picsum.photos/id/870/320/180", duration: "18:33", youtubeId: "9i6b0vJ8i8Q" },
      { id: 5, title: "React vs Next.js", channel: "Traversy Media", views: "678K views", time: "12 hours ago", thumbnail: "https://picsum.photos/id/180/320/180", duration: "35:15", youtubeId: "w7ejDZ8SWv8" },
    ];

    let allVideos = [...videos, ...videos, ...videos.slice(0, 5)];

    window.onload = function() {
      userName = prompt("Enter your name:", "Ahad");
      if (!userName || userName.trim() === "") userName = "Guest";

      alert(`Welcome to YouTube, ${userName}! 🎉`);
      document.getElementById("userNameDisplay").textContent = userName;

      renderVideos();
      setupSidebarClicks();
    };

    function renderVideos() {
      const container = document.getElementById("videoGrid");
      container.innerHTML = "";

      allVideos.forEach(video => {
        const col = document.createElement("div");
        col.className = "col-lg-3 col-md-4 col-sm-6";

        col.innerHTML = `
          <div class="video-card">
            <div class="thumbnail" style="background-image: url('${video.thumbnail}')">
              <div class="duration">${video.duration}</div>
            </div>
            <div class="d-flex gap-3 mt-3">
              <div class="flex-shrink-0">
                <img src="https://picsum.photos/id/${video.id + 50}/36/36" class="rounded-circle" width="36" height="36" alt="">
              </div>
              <div class="flex-grow-1">
                <div class="fw-medium lh-sm video-title">${video.title}</div>
                <div class="text-secondary small mt-1">${video.channel}</div>
                <div class="text-secondary small">${video.views} • ${video.time}</div>
              </div>
            </div>
          </div>
        `;

        col.querySelector('.video-card').addEventListener("click", () => {
          console.log(`Opening: ${video.title}`);
          window.open(`https://www.youtube.com/watch?v=${video.youtubeId}`, "_blank");
        });

        container.appendChild(col);
      });
    }

    // Sidebar clicks
    function setupSidebarClicks() {
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          const text = item.textContent.trim();
          alert(`Opening ${text}...`);
          console.log(`Sidebar clicked: ${text}`);
        });
      });
    }

    // Search
    document.getElementById("searchBtn").addEventListener("click", () => {
      const input = document.getElementById("searchInput").value.trim();
      console.log(`Search performed: "${input}"`);
      if (input) alert(`Searching for: "${input}"`);
    });

    // Mic Button
    document.getElementById("micBtn").addEventListener("click", () => {
      alert("🎤 Voice search activated!\n(Say something like 'cricket highlights')");
      console.log("Microphone clicked");
    });

    console.log("YouTube Clone with Bootstrap 5 loaded successfully!");
  </script>
</body>
</html>
