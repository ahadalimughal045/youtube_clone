<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    body {
      background-color: #0f0f0f;
      color: #f1f1f1;
      font-family: 'Roboto', system-ui, sans-serif;
    }

    .navbar { 
      background-color: #0f0f0f; 
      border-bottom: 1px solid #272727; 
    }

    .search-bar {
      background: #121212;
      border: 1px solid #303030;
      color: #fff;
    }
    .search-bar:focus {
      box-shadow: 0 0 0 2px #1c62ff;
      border-color: #1c62ff;
    }

    .category-chip {
      background-color: #272727;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-chip:hover, .category-chip.active {
      background-color: #fff;
      color: #0f0f0f;
      font-weight: 500;
    }

    .video-card {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .video-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }

    .thumbnail {
      width: 100%;
      height: 168px;
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .offcanvas {
      background-color: #0f0f0f;
      color: #fff;
      width: 260px !important;
    }

    .sidebar-item {
      padding: 12px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 14.5px;
    }

    .sidebar-item:hover, .sidebar-item.active {
      background-color: #272727;
    }

    .section-title {
      padding: 10px 24px 6px;
      font-size: 13px;
      color: #aaaaaa;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <div class="d-flex align-items-center gap-3">
        <button class="btn text-white fs-4 p-2" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="d-flex align-items-center gap-1 text-danger fs-4 fw-bold">
          <i class="fa-brands fa-youtube"></i> YouTube
        </div>
      </div>

      <div class="d-flex flex-grow-1 justify-content-center mx-4" style="max-width: 680px;">
        <div class="input-group">
          <input type="text" id="searchInput" class="form-control search-bar rounded-start-pill py-2" placeholder="Search">
          <button id="searchBtn" class="btn btn-outline-secondary border-start-0 rounded-end-pill px-4">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
        <button id="micBtn" class="btn btn-outline-secondary ms-3 rounded-circle d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
          <i class="fa-solid fa-microphone"></i>
        </button>
      </div>

      <div class="d-flex align-items-center gap-4 text-white fs-4">
        <i class="fa-solid fa-video"></i>
        <i class="fa-solid fa-bell"></i>
        <i class="fa-solid fa-user-circle fs-3"></i>
      </div>
    </div>
  </nav>

  <!-- Welcome Bar -->
  <div id="welcome" class="text-center py-2 bg-black border-bottom text-white" style="margin-top: 56px;">
    Welcome to YouTube, <strong id="userNameDisplay"></strong>!
  </div>

  <!-- Sidebar -->
  <div class="offcanvas offcanvas-start" id="sidebarOffcanvas">
    <div class="offcanvas-body p-0">
      <div class="sidebar-item active"><i class="fa-solid fa-house"></i> Home</div>
      <div class="sidebar-item"><i class="fa-solid fa-bolt"></i> Shorts</div>
      <div class="sidebar-item"><i class="fa-solid fa-play"></i> Subscriptions</div>
      <hr class="border-secondary mx-3 my-2">
      <div class="sidebar-item"><i class="fa-solid fa-user"></i> You</div>
      <div class="sidebar-item"><i class="fa-solid fa-clock-rotate-left"></i> History</div>
      <div class="sidebar-item"><i class="fa-solid fa-list"></i> Playlists</div>
      <div class="sidebar-item"><i class="fa-solid fa-clock"></i> Watch Later</div>
      <div class="sidebar-item"><i class="fa-solid fa-thumbs-up"></i> Liked Videos</div>
      <div class="sidebar-item"><i class="fa-solid fa-download"></i> Downloads</div>
      <hr class="border-secondary mx-3 my-2">
      <div class="section-title">Explore</div>
      <div class="sidebar-item"><i class="fa-solid fa-music"></i> Music</div>
      <div class="sidebar-item"><i class="fa-solid fa-gamepad"></i> Gaming</div>
      <div class="sidebar-item"><i class="fa-solid fa-newspaper"></i> News</div>
      <div class="sidebar-item"><i class="fa-solid fa-trophy"></i> Sports</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container-fluid pt-4" style="margin-top: 70px;">
    
    <!-- Category Chips -->
    <div class="d-flex gap-2 pb-3 overflow-auto hide-scrollbar">
      <button class="category-chip active">All</button>
      <button class="category-chip">Gaming</button>
      <button class="category-chip">Music</button>
      <button class="category-chip">Live</button>
      <button class="category-chip">Programming</button>
      <button class="category-chip">News</button>
      <button class="category-chip">Sports</button>
      <button class="category-chip">Mixes</button>
      <button class="category-chip">Recently Uploaded</button>
      <button class="category-chip">Watched</button>
    </div>

    <!-- Video Grid -->
    <div class="row g-4" id="videoGrid"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    var userName = "";

    // Base videos (expanded to 100 by repeating with variations)
    const baseVideos = [
      { title: "The Future of AI in 2026", channel: "Tech Insider", views: "2.4M", time: "2 days ago", duration: "14:22", youtubeId: "dQw4w9wgxcq" },
      { title: "Building Modern Web Apps with Next.js", channel: "Web Dev Simplified", views: "1.1M", time: "1 week ago", duration: "32:15", youtubeId: "3JZ_D3ELwOQ" },
      { title: "JavaScript in 2026 - What's New?", channel: "freeCodeCamp", views: "3.8M", time: "3 days ago", duration: "48:50", youtubeId: "PkZNo7MFNFg" },
      { title: "Karachi Street Food Tour – Best Biryani", channel: "Food With Ahad", views: "892K", time: "12 hours ago", duration: "19:45", youtubeId: "9i6b0vJ8i8Q" },
      { title: "React vs Svelte – Which is Better?", channel: "Traversy Media", views: "945K", time: "5 days ago", duration: "27:10", youtubeId: "w7ejDZ8SWv8" },
    ];

    // Generate 100 videos with variety
    let allVideos = [];
    for (let i = 0; i < 100; i++) {
      const base = baseVideos[i % baseVideos.length];
      allVideos.push({
        id: i + 1,
        title: base.title + (i % 3 === 0 ? " (Updated)" : ""),
        channel: base.channel,
        views: base.views,
        time: base.time,
        duration: base.duration,
        thumbnail: `https://picsum.photos/id/${(i % 100) + 100}/320/180`,
        youtubeId: base.youtubeId
      });
    }

    window.onload = function() {
      userName = prompt("Enter your name:", "Ahad");
      if (!userName || userName.trim() === "") userName = "Guest";

      alert(`Welcome back to YouTube, ${userName}! 🎉`);
      document.getElementById("userNameDisplay").textContent = userName;

      renderVideos();
      setupSidebarClicks();
    };

    function renderVideos(filteredVideos = allVideos) {
      const container = document.getElementById("videoGrid");
      container.innerHTML = "";

      filteredVideos.forEach(video => {
        const col = document.createElement("div");
        col.className = "col-xl-3 col-lg-4 col-md-6 col-sm-12";

        col.innerHTML = `
          <div class="video-card">
            <div class="thumbnail" style="background-image: url('${video.thumbnail}')">
              <div class="duration">${video.duration}</div>
            </div>
            <div class="d-flex gap-3 mt-3">
              <img src="https://picsum.photos/id/${video.id + 200}/36/36" class="rounded-circle flex-shrink-0" width="36" height="36" alt="">
              <div class="flex-grow-1">
                <div class="fw-medium lh-sm" style="font-size:15px; line-height:1.3;">${video.title}</div>
                <div class="text-secondary small mt-1">${video.channel}</div>
                <div class="text-secondary small">${video.views} views • ${video.time}</div>
              </div>
            </div>
          </div>
        `;

        col.querySelector('.video-card').addEventListener("click", () => {
          console.log(`Opening video: ${video.title}`);
          window.open(`https://www.youtube.com/watch?v=${video.youtubeId}`, "_blank");
        });

        container.appendChild(col);
      });
    }

    function setupSidebarClicks() {
      document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          alert(`Opening ${item.textContent.trim()} section...`);
        });
      });
    }

    // Search Button
    document.getElementById("searchBtn").addEventListener("click", () => {
      const query = document.getElementById("searchInput").value.trim();
      console.log(`User searched: ${query}`);
      if (query) alert(`Showing results for "${query}"`);
    });

    // Mic Button
    document.getElementById("micBtn").addEventListener("click", () => {
      alert("🎤 Voice Search Activated\nTry saying: 'cricket highlights' or 'javascript tutorial'");
    });

    console.log("YouTube Clone with 100 videos & improved UI loaded!");
  </script>
</body>
</html>
