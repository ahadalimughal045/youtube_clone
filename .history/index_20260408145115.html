<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube UI Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      background-color: #0f0f0f !important;
      border-bottom: 1px solid #222;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: fixed;
      left: -220px;
      top: 0;
      background-color: #0f0f0f;
      transition: 0.3s;
      z-index: 1000;
      border-right: 1px solid #222;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar li {
      padding: 12px 20px;
    }

    .sidebar li:hover {
      background-color: #272727;
      cursor: pointer;
    }

    /* Content */
    .content {
      width: 100%;
      margin-left: 0;
      transition: 0.3s;
    }

    .content.shift {
      margin-left: 220px;
    }

    /* Cards */
    .card {
      border: none;
      background-color: #181818;
      border-radius: 10px;
    }

    .card img {
      border-radius: 10px;
    }

    .text-muted {
      color: #aaa !important;
    }

    /* Responsive fix */
    @media (max-width: 768px) {
      .content.shift {
        margin-left: 0;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3 d-flex align-items-center">
  <button class="btn btn-outline-light" id="menuBtn">☰</button>
  <h5 class="ms-3 mb-0">YouTube</h5>
</nav>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <ul class="list-unstyled mt-4">
      <li>🏠 Home</li>
      <li>🎬 Shorts</li>
      <li>📺 Subscriptions</li>
      <li>📚 Library</li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="content p-3">

    <div class="row g-3">

      <!-- CARD -->
      <div class="col-lg-4 col-md-6 col-12">
        <div class="card text-white">
          <img src="https://picsum.photos/400/200" class="card-img-top">
          <div class="card-body">
            <h6>Samay Raina - STILL ALIVE</h6>
            <p class="small text-muted">9M views • 19 hours ago</p>
          </div>
        </div>
      </div>

      <div class="col-lg-4 col-md-6 col-12">
        <div class="card text-white">
          <img src="https://picsum.photos/401/200" class="card-img-top">
          <div class="card-body">
            <h6>University Tour Video</h6>
            <p class="small text-muted">8K views • 1 year ago</p>
          </div>
        </div>
      </div>

      <div class="col-lg-4 col-md-6 col-12">
        <div class="card text-white">
          <img src="https://picsum.photos/402/200" class="card-img-top">
          <div class="card-body">
            <h6>Study Music for Focus</h6>
            <p class="small text-muted">12M views • 6 years ago</p>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const content = document.querySelector(".content");

  menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("active");
    content.classList.toggle("shift");
  });
</script>

</body>
</html>
