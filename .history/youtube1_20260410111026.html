<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: 'Roboto', sans-serif; background: #0f0f0f; color: #fff; }
    .navbar { background: #0f0f0f; border-bottom: 1px solid #303030; }
    .sidebar { background: #0f0f0f; height: 100vh; position: fixed; overflow-y: auto; width: 240px; transition: all 0.3s; }
    .sidebar.collapsed { width: 80px; }
    .sidebar .nav-link { color: #fff; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #272727; }
    .video-card img { transition: all 0.2s; }
    .video-card:hover img { transform: scale(1.05); }
    .video-grid { margin-left: 260px; }
    .sidebar.collapsed + .video-grid { margin-left: 100px; }
    .modal-content { background: #1f1f1f; }
    .search-input { background: #121212; border: 1px solid #303030; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top px-3">
  <div class="container-fluid">
    <div class="d-flex align-items-center">
      <button class="btn btn-link text-white me-3" id="toggleSidebar">
        <i class="fas fa-bars fa-lg"></i>
      </button>
      <a href="#" class="navbar-brand d-flex align-items-center">
        <i class="fab fa-youtube text-danger me-1" style="font-size: 2rem;"></i>
        <span class="fs-4 fw-bold">YouTube</span>
      </a>
    </div>

    <!-- Search -->
    <div class="mx-auto" style="max-width: 600px;">
      <div class="input-group">
        <input type="text" id="searchInput" class="form-control search-input rounded-start-pill ps-4" placeholder="Search" />
        <button class="btn btn-outline-secondary rounded-end-pill px-4">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <div class="d-flex align-items-center gap-3">
      <i class="fas fa-video fa-lg"></i>
      <i class="fas fa-bell fa-lg"></i>
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
        A
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar pt-5 mt-5" id="sidebar">
  <div class="nav flex-column px-2">
    <a href="#" class="nav-link active py-3"><i class="fas fa-home me-3"></i> <span>Home</span></a>
    <a href="#" class="nav-link py-3"><i class="fas fa-fire me-3"></i> <span>Trending</span></a>
    <a href="#" class="nav-link py-3"><i class="fas fa-play-circle me-3"></i> <span>Subscriptions</span></a>
    <hr class="my-2">
    <a href="#" class="nav-link py-3"><i class="fas fa-bookmark me-3"></i> <span>Library</span></a>
    <a href="#" class="nav-link py-3"><i class="fas fa-history me-3"></i> <span>History</span></a>
    <a href="#" class="nav-link py-3"><i class="fas fa-clock me-3"></i> <span>Watch Later</span></a>
  </div>
</div>

<!-- Main Content -->
<div class="video-grid pt-5 mt-5 container-fluid">
  <div class="row g-4" id="videoContainer">
    <!-- Videos will be added by JavaScript -->
  </div>
</div>

<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header border-0">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="ratio ratio-16x9">
          <iframe id="modalVideo" src="" title="YouTube video" allowfullscreen></iframe>
        </div>
        <div class="p-4">
          <h5 id="modalTitle"></h5>
          <p id="modalChannel" class="text-muted"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Sample Videos Data
const videos = [
  {
    id: "dQw4w9wgxcq",
    title: "Never Gonna Give You Up - Rick Astley",
    channel: "Rick Astley",
    views: "1.2B views",
    time: "14 years ago",
    thumbnail: "https://i.ytimg.com/vi/dQw4w9wgxcq/maxresdefault.jpg"
  },
  {
    id: "3JZ_3J4p9pA",
    title: "How to Build a YouTube Clone | HTML CSS JS Tutorial",
    channel: "Web Dev Simplified",
    views: "450K views",
    time: "2 days ago",
    thumbnail: "https://i.ytimg.com/vi/3JZ_3J4p9pA/maxresdefault.jpg"
  },
  {
    id: "9YffrCVyTVk",
    title: "The Future of AI in 2026",
    channel: "xAI",
    views: "890K views",
    time: "5 hours ago",
    thumbnail: "https://i.ytimg.com/vi/9YffrCVyTVk/maxresdefault.jpg"
  },
  // Add more if you want (copy paste pattern)
];

// Render Videos
function renderVideos(filteredVideos) {
  const container = document.getElementById("videoContainer");
  container.innerHTML = "";

  filteredVideos.forEach(video => {
    const card = `
      <div class="col-lg-3 col-md-4 col-sm-6 video-card">
        <div class="position-relative">
          <img src="${video.thumbnail}" class="img-fluid rounded" alt="${video.title}">
          <span class="position-absolute bottom-0 end-0 bg-dark text-white px-2 py-1 m-2 rounded small">12:45</span>
        </div>
        <div class="d-flex mt-3">
          <div class="flex-shrink-0">
            <div class="rounded-circle bg-secondary" style="width: 40px; height: 40px;"></div>
          </div>
          <div class="ms-3 flex-grow-1">
            <h6 class="mb-1" style="cursor:pointer;" onclick="playVideo('${video.id}', '${video.title}', '${video.channel}')">${video.title}</h6>
            <p class="mb-0 text-muted small">${video.channel}</p>
            <p class="text-muted small">${video.views} • ${video.time}</p>
          </div>
        </div>
      </div>
    `;
    container.innerHTML += card;
  });
}

// Play Video in Modal
function playVideo(videoId, title, channel) {
  document.getElementById("modalVideo").src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalChannel").textContent = channel;
  new bootstrap.Modal(document.getElementById("videoModal")).show();
}

// Sidebar Toggle
document.getElementById("toggleSidebar").addEventListener("click", () => {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("collapsed");
});

// Search Functionality
document.getElementById("searchInput").addEventListener("keyup", (e) => {
  const term = e.target.value.toLowerCase();
  const filtered = videos.filter(v => 
    v.title.toLowerCase().includes(term) || 
    v.channel.toLowerCase().includes(term)
  );
  renderVideos(filtered);
});

// Initial Render
renderVideos(videos);

// Close modal on hide (stop video)
const modal = document.getElementById("videoModal");
modal.addEventListener("hidden.bs.modal", () => {
  document.getElementById("modalVideo").src = "";
});
</script>
</body>
</html>
