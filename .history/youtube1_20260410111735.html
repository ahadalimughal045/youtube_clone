<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f9f9f9;
    }

    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .menu-icon {
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
    }

    .menu-icon:hover {
      background-color: #f0f0f0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 22px;
      font-weight: bold;
      color: #ff0000;
    }

    .search-container {
      flex: 1;
      max-width: 640px;
      margin: 0 40px;
      display: flex;
    }

    .search-bar {
      flex: 1;
      padding: 12px 20px;
      border: 1px solid #ccc;
      border-radius: 40px 0 0 40px;
      font-size: 16px;
      outline: none;
    }

    .search-btn {
      padding: 12px 25px;
      background-color: #f8f8f8;
      border: 1px solid #ccc;
      border-left: none;
      border-radius: 0 40px 40px 0;
      cursor: pointer;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .icon {
      font-size: 24px;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      width: 240px;
      height: calc(100vh - 60px);
      background-color: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      transition: all 0.3s;
      z-index: 900;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      cursor: pointer;
      gap: 24px;
      font-size: 14px;
    }

    .sidebar-item:hover {
      background-color: #f2f2f2;
    }

    .sidebar-item.active {
      background-color: #f2f2f2;
      font-weight: 500;
    }

    /* Main Content */
    .main-content {
      margin-left: 240px;
      padding: 20px;
      padding-top: 80px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .video-card {
      cursor: pointer;
    }

    .thumbnail {
      width: 100%;
      height: 157px;
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .video-info {
      display: flex;
      margin-top: 12px;
      gap: 12px;
    }

    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-size: cover;
    }

    .video-details {
      flex: 1;
    }

    .video-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .channel-name {
      font-size: 13px;
      color: #606060;
      margin-bottom: 4px;
    }

    .video-meta {
      font-size: 13px;
      color: #606060;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        overflow: hidden;
      }
      .main-content {
        margin-left: 0;
      }
    }

    /* Welcome Message */
    #welcome {
      background: #0f0f0f;
      color: white;
      padding: 10px 20px;
      text-align: center;
      font-size: 16px;
      position: sticky;
      top: 60px;
      z-index: 999;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="left">
      <span class="menu-icon" id="menuBtn">☰</span>
      <div class="logo">
        <span style="color:#ff0000;">▶</span> YouTube
      </div>
    </div>

    <div class="search-container">
      <input type="text" class="search-bar" id="searchInput" placeholder="Search">
      <button class="search-btn" id="searchBtn">🔍</button>
    </div>

    <div class="right">
      <span class="icon">🎥</span>
      <span class="icon">🛎️</span>
      <span class="icon">👤</span>
    </div>
  </nav>

  <!-- Welcome Banner -->
  <div id="welcome">Welcome to YouTube, <strong id="userNameDisplay"></strong>!</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-item active"><span>🏠</span> Home</div>
    <div class="sidebar-item"><span>🔥</span> Trending</div>
    <div class="sidebar-item"><span>📺</span> Subscriptions</div>
    <div class="sidebar-item"><span>📚</span> Library</div>
    <div class="sidebar-item"><span>🕒</span> History</div>
    <div class="sidebar-item"><span>❤️</span> Liked videos</div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="video-grid" id="videoGrid">
      <!-- Videos will be added by JavaScript -->
    </div>
  </div>

  <script>
    // Variables (using var, let, const)
    var userName = "";
    let searchText = "";
    const videos = [
      { id: 1, title: "The Future of AI in 2026", channel: "Tech Insider", views: "1.2M views", time: "2 days ago", thumbnail: "https://picsum.photos/id/1015/320/180", duration: "12:45" },
      { id: 2, title: "Building a YouTube Clone from Scratch", channel: "Web Dev Simplified", views: "892K views", time: "1 week ago", thumbnail: "https://picsum.photos/id/201/320/180", duration: "28:10" },
      { id: 3, title: "Why You Should Learn JavaScript in 2026", channel: "freeCodeCamp", views: "2.1M views", time: "3 days ago", thumbnail: "https://picsum.photos/id/237/320/180", duration: "45:22" },
      { id: 4, title: "Karachi Street Food Tour 2026", channel: "Food With Ahad", views: "456K views", time: "5 hours ago", thumbnail: "https://picsum.photos/id/870/320/180", duration: "18:33" },
      { id: 5, title: "React vs Next.js - Which One Should You Choose?", channel: "Traversy Media", views: "678K views", time: "12 hours ago", thumbnail: "https://picsum.photos/id/180/320/180", duration: "35:15" },
      { id: 6, title: "Elon Musk's Latest Interview (Full)", channel: "Lex Fridman", views: "3.4M views", time: "1 day ago", thumbnail: "https://picsum.photos/id/1018/320/180", duration: "1:42:10" },
      { id: 7, title: "How I Made $10,000 with YouTube in 30 Days", channel: "MrBeast Gaming", views: "5.6M views", time: "4 days ago", thumbnail: "https://picsum.photos/id/201/320/180", duration: "22:50" },
      { id: 8, title: "Pakistan vs India - Epic Cricket Highlights", channel: "PCB Official", views: "12M views", time: "2 hours ago", thumbnail: "https://picsum.photos/id/133/320/180", duration: "15:20" },
      { id: 9, title: "CSS Grid vs Flexbox - When to Use What", channel: "Kevin Powell", views: "234K views", time: "6 days ago", thumbnail: "https://picsum.photos/id/201/320/180", duration: "19:45" },
      { id: 10, title: "The Most Beautiful Places in Pakistan", channel: "Travel With Us", views: "789K views", time: "3 days ago", thumbnail: "https://picsum.photos/id/870/320/180", duration: "28:12" },
    ];

    // Repeat videos to make 25+ items
    let allVideos = [...videos, ...videos, ...videos.slice(0, 5)];

    // Prompt for user name when page loads
    window.onload = function() {
      userName = prompt("Enter your name to continue:", "Ahad");
      
      if (!userName || userName.trim() === "") {
        userName = "Guest";
      }

      // Show welcome message using alert
      alert(`Welcome to YouTube, ${userName}! 🎉`);

      // Display user name on page
      document.getElementById("userNameDisplay").textContent = userName;

      // Render all videos
      renderVideos();
    };

    // Render Videos
    function renderVideos(filteredVideos = allVideos) {
      const videoGrid = document.getElementById("videoGrid");
      videoGrid.innerHTML = "";

      filteredVideos.forEach(video => {
        const videoCard = document.createElement("div");
        videoCard.className = "video-card";
        videoCard.innerHTML = `
          <div class="thumbnail" style="background-image: url('${video.thumbnail}')">
            <div class="duration">${video.duration}</div>
          </div>
          <div class="video-info">
            <div class="channel-avatar" style="background-image: url('https://picsum.photos/id/${video.id + 50}/36/36')"></div>
            <div class="video-details">
              <div class="video-title">${video.title}</div>
              <div class="channel-name">${video.channel}</div>
              <div class="video-meta">${video.views} • ${video.time}</div>
            </div>
          </div>
        `;

        // Click event on video
        videoCard.addEventListener("click", () => {
          console.log(`User clicked on video: ${video.title}`);
          alert(`🎥 Now playing: ${video.title}\n\nChannel: ${video.channel}`);
        });

        videoGrid.appendChild(videoCard);
      });
    }

    // Search Functionality
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");

    searchBtn.addEventListener("click", () => {
      searchText = searchInput.value.trim();
      console.log(`Search performed: "${searchText}"`);

      if (searchText === "") {
        renderVideos(allVideos);
        return;
      }

      const filtered = allVideos.filter(video =>
        video.title.toLowerCase().includes(searchText.toLowerCase()) ||
        video.channel.toLowerCase().includes(searchText.toLowerCase())
      );

      renderVideos(filtered);
    });

    // Allow pressing Enter in search bar
    searchInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        searchBtn.click();
      }
    });

    // Sidebar Toggle (Hamburger Menu)
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");

    let sidebarOpen = true;

    menuBtn.addEventListener("click", () => {
      sidebarOpen = !sidebarOpen;
      if (sidebarOpen) {
        sidebar.style.width = "240px";
      } else {
        sidebar.style.width = "0";
      }
      console.log("Sidebar toggled");
    });

    // Log when page loads
    console.log("YouTube Homepage Clone loaded successfully!");
    console.log(`User: ${userName}`);
  </script>
</body>
</html>
