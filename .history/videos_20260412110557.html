<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 Videos - YouTube Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #0f0f0f; color: #f1f1f1; font-family: Arial, sans-serif; }
    .thumbnail { height: 168px; background-size: cover; background-position: center; border-radius: 12px; position: relative; }
    .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); color: white; font-size: 12px; padding: 2px 6px; border-radius: 3px; }
    .video-card:hover { transform: translateY(-5px); transition: 0.3s; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container-fluid pt-4">
    <div class="row g-4">
      <!-- 100 Static Videos - Cycling 4 templates -->
      <script>
        // Pure HTML generation for demo - REMOVE THIS FOR NO JS
        const templates = [
          {title: "The Future of AI", channel: "Tech Insider", duration: "12:45", id: "dQw4w9wgxcq"},
          {title: "YouTube Clone Tutorial", channel: "Web Dev", duration: "28:10", id: "3JZ_D3ELwOQ"},
          {title: "JS 2026 Features", channel: "freeCodeCamp", duration: "45:22", id: "PkZNo7MFNFg"},
          {title: "Karachi Food Tour", channel: "Food Ahad", duration: "18:33", id: "9i6b0vJ8i8Q"}
        ];
        let html = '';
        for(let i = 0; i < 100; i++) {
          const v = templates[i % 4];
          html += `
            <div class="col-xl-3 col-lg-4 col-md-6">
              <a href="https://youtube.com/watch?v=${v.id}" target="_blank" class="video-card">
                <div class="thumbnail" style="background-image: url('https://picsum.photos/id/${100+i}/320/180')">
                  <div class="duration">${v.duration}</div>
                </div>
                <div class="d-flex gap-3 mt-3">
                  <img src="https://picsum.photos/id/${200+i}/36/36" class="rounded-circle" width="36" height="36">
                  <div class="flex-grow-1">
                    <div style="font-size:15px; line-height:1.35;">${v.title} Part ${i+1}</div>
                    <div class="text-secondary small">${v.channel}</div>
                    <div class="text-secondary small">${(i+1)*10}K views • ${i+1} days ago</div>
                  </div>
                </div>
              </a>
            </div>`;
        }
        document.write(html);
      </script>
    </div>
  </div>
</body>
</html>
