<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Clone UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background-color: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  background-color: #0f0f0f;
  border-bottom: 1px solid #222;
  padding: 10px 20px;
}

/* HOVER EFFECTS */
i:hover, button:hover {
  background: #272727;
  border-radius: 50%;
  padding: 6px;
  transition: 0.2s;
  cursor: pointer;
}

/* SEARCH */
.search-box {
  width: 50%;
  display: flex;
}

.search-box input {
  width: 100%;
  background: #121212;
  border: 1px solid #303030;
  color: white;
  padding: 8px;
  border-radius: 20px 0 0 20px;
}

.search-box input:focus {
  outline: none;
  border-color: #3ea6ff;
}

.search-box button {
  background: #222;
  border: 1px solid #303030;
  color: white;
  border-radius: 0 20px 20px 0;
}

/* CATEGORY BAR */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  border-bottom: 1px solid #222;
}

.categories button {
  background: #272727;
  border: none;
  color: white;
  margin-right: 10px;
  padding: 6px 15px;
  border-radius: 20px;
}

.categories button:hover {
  background: #3a3a3a;
}

.categories .active {
  background: white;
  color: black;
}

/* DROPDOWN */
.dropdown-box {
  display: none;
  background: #181818;
  padding: 15px;
}

.dropdown-box.active {
  display: block;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  left: -220px;
  top: 0;
  background-color: #0f0f0f;
  transition: 0.3s;
  border-right: 1px solid #222;
}

.sidebar.active {
  left: 0;
}

.sidebar li {
  padding: 12px 20px;
}

.sidebar li:hover {
  background-color: #272727;
  cursor: pointer;
}

/* CONTENT */
.content {
  margin-top: 120px;
  padding: 20px;
  transition: 0.3s;
}

.content.shift {
  margin-left: 220px;
}

/* CARD */
.card {
  background-color: #181818;
  border: none;
  border-radius: 10px;
}

.text-muted {
  color: #aaa !important;
}

/* MOBILE */
@media(max-width:768px){
  .search-box {
    width: 60%;
  }
  .content.shift {
    margin-left: 0;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between align-items-center">

  <!-- LEFT -->
  <div class="d-flex align-items-center">
    <i class="fa-solid fa-bars fs-4" id="menuBtn"></i>
    <span class="ms-3 fw-bold">
      <i class="fa-brands fa-youtube text-danger"></i> YouTube
    </span>
  </div>

  <!-- CENTER -->
  <div class="search-box">
    <input type="text" placeholder="Search">
    <button><i class="fa-solid fa-magnifying-glass"></i></button>
  </div>

  <!-- RIGHT -->
  <div>
    <i class="fa-solid fa-microphone"></i>
    <i class="fa-solid fa-bell"></i>
    <i class="fa-solid fa-user-circle"></i>
  </div>

</nav>

<!-- CATEGORY BAR -->
<div class="categories">
  <button class="active" onclick="showCategory('all')">All</button>
  <button onclick="showCategory('music')">Music</button>
  <button onclick="showCategory('gaming')">Gaming</button>
  <button onclick="showCategory('web')">Web Dev</button>
  <button onclick="showCategory('ai')">AI</button>
</div>

<!-- DROPDOWN CONTENT -->
<div id="all" class="dropdown-box active">Showing All Content</div>
<div id="music" class="dropdown-box">🎵 Music Videos List</div>
<div id="gaming" class="dropdown-box">🎮 Gaming Videos List</div>
<div id="web" class="dropdown-box">💻 Web Dev Tutorials</div>
<div id="ai" class="dropdown-box">🤖 AI Content</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <ul class="list-unstyled mt-4">
    <li>🏠 Home</li>
    <li>🎬 Shorts</li>
    <li>📺 Subscriptions</li>
    <li>📚 Library</li>
  </ul>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="row g-3">

    <div class="col-lg-4 col-md-6 col-12">
      <div class="card text-white p-2">
        <img src="https://picsum.photos/400/200">
        <div class="mt-2">
          <h6>Sample Video</h6>
          <p class="small text-muted">1M views • 1 day ago</p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
// SIDEBAR
document.getElementById("menuBtn").onclick = () => {
  document.getElementById("sidebar").classList.toggle("active");
  document.querySelector(".content").classList.toggle("shift");
};

// CATEGORY CLICK
function showCategory(id) {
  document.querySelectorAll(".dropdown-box").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".categories button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

</body>
</html>
