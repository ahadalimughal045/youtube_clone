<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTube - Watch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f0f0f; color: #fff; }
    .player-container { aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; }
  </style>
</head>
<body class="pt-3">
  <div class="container">
    <div class="row">
      <div class="col-lg-8">
        <div class="player-container">
          <iframe id="player" width="100%" height="100%" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <h2 id="videoTitle" class="mt-3"></h2>
      </div>
      <div class="col-lg-4">
        <h5>Up Next</h5>
        <!-- Recommendations can be added here -->
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id') || 'dQw4w9wgxcq';

    document.getElementById('player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
    document.getElementById('videoTitle').textContent = "Playing YouTube Video";
  </script>
</body>
</html>
