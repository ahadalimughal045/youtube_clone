<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:white;
}

/* TOGGLE */
#menuToggle{
  display:none;
}

/* NAVBAR */
.navbar{
  background:#0f0f0f;
  border-bottom:1px solid #222;
}

/* SEARCH */
.search-box{
  width:45%;
}
.search-box input{
  background:#121212;
  border:1px solid #303030;
  color:white;
  border-radius:20px 0 0 20px;
}
.search-box button{
  border-radius:0 20px 20px 0;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  top:0;
  left:-220px;
  background:#0f0f0f;
  border-right:1px solid #222;
  transition:0.3s;
}

#menuToggle:checked ~ .sidebar{
  left:0;
}

.sidebar li{
  padding:12px 20px;
}
.sidebar li:hover{
  background:#272727;
}

/* CONTENT */
.content{
  margin-top:120px;
  padding:20px;
  transition:0.3s;
}

#menuToggle:checked ~ .content{
  margin-left:220px;
}

/* CATEGORY */
.categories{
  overflow-x:auto;
  white-space:nowrap;
  padding:10px;
}
.categories button{
  background:#272727;
  border:none;
  color:white;
  margin-right:10px;
  padding:6px 15px;
  border-radius:20px;
}
.categories button:hover{
  background:white;
  color:black;
}

/* VIDEO CARD */
.video-card{
  transition:0.3s;
}
.video-card:hover{
  transform:scale(1.05);
}

.video-card iframe{
  width:100%;
  height:200px;
  border-radius:10px;
}

.channel{
  color:#aaa;
  font-size:13px;
}

/* ICON HOVER */
i:hover{
  background:#272727;
  padding:6px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOGGLE -->
<input type="checkbox" id="menuToggle">

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between px-3 align-items-center">

<div class="d-flex align-items-center">
  <label for="menuToggle">
    <i class="fa fa-bars fs-4"></i>
  </label>

  <span class="ms-3 fw-bold">
    <i class="fa-brands fa-youtube text-danger"></i> YouTube
  </span>
</div>

<div class="d-flex search-box">
  <input type="text" class="form-control" placeholder="Search">
  <button class="btn btn-dark"><i class="fa fa-search"></i></button>
  <i class="fa fa-microphone ms-2"></i>
</div>

<div class="d-flex align-items-center">
  <i class="fa fa-bell me-3"></i>
  <i class="fa fa-user-circle fs-4"></i>
</div>

</nav>

<!-- CATEGORY -->
<div class="categories">
  <button>All</button>
  <button>Music</button>
  <button>Gaming</button>
  <button>Live</button>
  <button>AI</button>
  <button>Programming</button>
  <button>Podcasts</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <ul class="list-unstyled mt-4">
    <li>🏠 Home</li>
    <li>🎬 Shorts</li>
    <li>📺 Subscriptions</li>
    <hr>
    <li>🕒 History</li>
    <li>📂 Playlist</li>
    <li>⏱ Watch Later</li>
    <li>👍 Liked Videos</li>
  </ul>
</div>

<!-- CONTENT -->
<div class="content container-fluid">
  <div class="row g-4">

    <!-- 30 VIDEOS -->
    <!-- COPY THIS BLOCK -->

    <!-- START -->
    <div class="col-lg-4 col-md-6 col-12">
      <div class="video-card">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
        <h6 class="mt-2">Sample Video Title</h6>
        <div class="channel">Channel Name • 1M views • 1 day ago</div>
      </div>
    </div>
    <!-- END -->

    <!-- 👉 Is block ko 30 dafa copy paste kar do -->
    
  </div>
</div>

</body>
</html>
