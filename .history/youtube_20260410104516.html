<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <title>My YouTube - Only Alert + Document.Write</title>
  <style>
    body { background: #0f0f0f; color: white; font-family: Arial; text-align: center; padding: 20px; }
    h1 { color: #ff0000; }
  </style>
</head>
<body>

<script>
// Pehle page clear + heading likh do
document.write("<h1>▶ My YouTube (Sirf Allowed JS)</h1>");
document.write("<p>100 Videos hain. Koi bhi number 1 se 100 tak type karo aur OK dabao.</p><br>");

// 100 videos ka simple list (title + video id)
let videos = [];
for(let i = 1; i <= 100; i++) {
  let title = "Video Number " + i + " - Amazing Video";
  let vid = "dQw4w9wgxcq";   // sab mein ek hi famous video (change kar sakte ho)
  if(i % 5 === 0) vid = "3JZ_3J1w4kU";
  if(i % 7 === 0) vid = "kXYiU_JCYtU";
  videos.push({num: i, title: title, id: vid});
}

// Ab user se input lo (alert se)
function startYouTube() {
  let input = prompt("Video number daalo (1 se 100 tak):");

  if(input === null) {
    alert("YouTube band ho gaya!");
    return;
  }

  let num = parseInt(input);

  if(num >= 1 && num <= 100) {
    let v = videos[num-1];
    
    console.log("=== Video Play Ho Raha Hai ===");
    console.log("Video Number:", v.num);
    console.log("Title:", v.title);
    console.log("YouTube ID:", v.id);
    console.log("Link: https://www.youtube.com/watch?v=" + v.id);

    // Document.write se nayi line mein info dikhao
    document.write("<hr><h2>Ab Video Chal Rahi Hai...</h2>");
    document.write("<p><b>Video " + v.num + ":</b> " + v.title + "</p>");
    document.write("<p>Browser ke Console mein dekho details (F12 daba kar Console tab kholo)</p>");
    document.write("<p>Video dekhne ke liye yeh link copy-paste karo:</p>");
    document.write('<p><a href="https://www.youtube.com/watch?v=' + v.id + '" target="_blank" style="color:#ff0000; font-size:20px;">▶ Video Abhi Play Karo</a></p><br>');

    alert("Video " + v.num + " select ho gaya!\nTitle: " + v.title + "\nConsole kholo details ke liye.");
    
  } else {
    alert("Galat number! 1 se 100 tak daalo.");
    startYouTube(); // phir se poocho
  }
}

// Start karo
startYouTube();

</script>

</body>
</html>
