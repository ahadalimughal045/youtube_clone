<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTube</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
    }

    /* Header */
    .yt-header {
      background: #0f0f0f;
      border-bottom: 1px solid #303030;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      padding: 8px 16px;
    }

    .yt-logo {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      text-decoration: none;
    }

    .yt-logo i {
      color: #ff0000;
      font-size: 28px;
    }

    .search-container {
      max-width: 640px;
      width: 100%;
      position: relative;
    }

    .search-input {
      background: #121212;
      border: 1px solid #303030;
      color: white;
      border-radius: 40px;
      padding: 10px 20px 10px 50px;
      width: 100%;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 18px;
    }

    .mic-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #181818;
      border: 1px solid #303030;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      border-radius: 50%;
    }

    .icon-btn:hover {
      background: #272727;
      color: white;
    }

    /* Offcanvas Sidebar (Left se aayega) */
    .offcanvas {
      background: #0f0f0f;
      color: #fff;
      width: 260px !important;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 24px;
      color: #aaa;
      text-decoration: none;
      font-size: 14.5px;
    }

    .sidebar-item:hover,
    .sidebar-item.active {
      background: #272727;
      color: white;
    }

    /* Category Bar */
    .category-bar {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      background: #0f0f0f;
      border-bottom: 1px solid #303030;
      padding: 12px 20px;
      white-space: nowrap;
      overflow-x: auto;
      z-index: 900;
    }

    .category-chip {
      display: inline-block;
      background: #272727;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      margin-right: 8px;
      font-size: 14px;
    }

    .category-chip:hover,
    .category-chip.active {
      background: #fff;
      color: black;
    }

    /* Main Content */
    .main-content {
      margin-top: 125px;
      padding: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 24px;
    }

    .video-card {
      text-decoration: none;
      color: inherit;
    }

    .thumbnail {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .thumbnail img {
      width: 100%;
      display: block;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .video-info {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .channel-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .video-title {
      font-size: 15px;
      line-height: 1.35;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .channel-name, .views {
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="yt-header d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
      <!-- Hamburger - Left Sidebar -->
      <button class="icon-btn fs-4" data-bs-toggle="offcanvas" data-bs-target="#leftSidebar">
        <i class="bi bi-list"></i>
      </button>

      <!-- YouTube Logo -->
      <a href="index.html" class="yt-logo">
        <i class="bi bi-youtube"></i>
        <span>MyTube</span>
      </a>
    </div>

    <!-- Search Bar with icon inside -->
    <div class="search-container d-flex align-items-center">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="search-input form-control" placeholder="Search">
      <button class="mic-btn ms-3"><i class="bi bi-mic"></i></button>
    </div>

    <!-- Right Side -->
    <div class="d-flex align-items-center gap-3">
      <a href="video.html" class="icon-btn"><i class="bi bi-video-camera"></i></a>
      <a href="#" class="icon-btn"><i class="bi bi-bell"></i></a>
      <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center fw-bold" 
           style="width: 32px; height: 32px; font-size: 15px;">A</div>
    </div>
  </header>

  <!-- Left Sidebar (Offcanvas) -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="leftSidebar">
    <div class="offcanvas-header">
      <a href="index.html" class="yt-logo">
        <i class="bi bi-youtube"></i>
        <span>MyTube</span>
      </a>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <a href="index.html" class="sidebar-item active">
        <i class="bi bi-house-door"></i>
        <span>Home</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-lightning-charge"></i>
        <span>Shorts</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-collection-play"></i>
        <span>Subscriptions</span>
      </a>

      <hr class="border-secondary mx-3 my-2">

      <a href="#" class="sidebar-item">
        <i class="bi bi-collection"></i>
        <span>Library</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-clock-history"></i>
        <span>History</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-play-btn"></i>
        <span>Your videos</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-clock"></i>
        <span>Watch later</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-hand-thumbs-up"></i>
        <span>Liked videos</span>
      </a>
      <a href="#" class="sidebar-item">
        <i class="bi bi-download"></i>
        <span>Downloads</span>
      </a>
    </div>
  </div>

  <!-- Category Bar -->
  <div class="category-bar">
    <span class="category-chip active">All</span>
    <span class="category-chip">Music</span>
    <span class="category-chip">Mixes</span>
    <span class="category-chip">Live</span>
    <span class="category-chip">Gaming</span>
    <span class="category-chip">Programming</span>
    <span class="category-chip">Cricket</span>
    <span class="category-chip">Recently uploaded</span>
  </div>

  <!-- Main Content - 9 Videos (repeat feel) -->
  <div class="main-content">
    <div class="video-grid" id="videoGrid">
      <!-- Videos yahan repeat honge -->
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Sample video data (9 videos for good grid)
    const videos = [
      {id: "dQw4w9wgxcq", title: "Rick Astley - Never Gonna Give You Up", channel: "Rick Astley", views: "1.4B views • 15 years ago", duration: "3:33", thumb: "https://img.youtube.com/vi/dQw4w9wgxcq/maxresdefault.jpg"},
      {id: "3JZ_3J4w4qQ", title: "Luis Fonsi - Despacito ft. Daddy Yankee", channel: "LuisFonsiVEVO", views: "8.2B views • 7 years ago", duration: "4:42", thumb: "https://img.youtube.com/vi/3JZ_3J4w4qQ/maxresdefault.jpg"},
      {id: "kXYiU_JCYtU", title: "Alan Walker - Faded", channel: "Alan Walker", views: "5.1B views • 8 years ago", duration: "3:32", thumb: "https://img.youtube.com/vi/kXYiU_JCYtU/maxresdefault.jpg"},
      {id: "JGwWNGJdvx8", title: "Ed Sheeran - Shape of You", channel: "Ed Sheeran", views: "6.3B views • 7 years ago", duration: "4:23", thumb: "https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg"},
      {id: "dQw4w9wgxcq", title: "Rick Astley - Never Gonna Give You Up", channel: "Rick Astley", views: "1.4B views • 15 years ago", duration: "3:33", thumb: "https://img.youtube.com/vi/dQw4w9wgxcq/maxresdefault.jpg"},
      {id: "3JZ_3J4w4qQ", title: "Luis Fonsi - Despacito ft. Daddy Yankee", channel: "LuisFonsiVEVO", views: "8.2B views • 7 years ago", duration: "4:42", thumb: "https://img.youtube.com/vi/3JZ_3J4w4qQ/maxresdefault.jpg"},
      {id: "kXYiU_JCYtU", title: "Alan Walker - Faded", channel: "Alan Walker", views: "5.1B views • 8 years ago", duration: "3:32", thumb: "https://img.youtube.com/vi/kXYiU_JCYtU/maxresdefault.jpg"},
      {id: "JGwWNGJdvx8", title: "Ed Sheeran - Shape of You", channel: "Ed Sheeran", views: "6.3B views • 7 years ago", duration: "4:23", thumb: "https://img.youtube.com/vi/JGwWNGJdvx8/maxresdefault.jpg"},
      {id: "dQw4w9wgxcq", title: "Rick Astley - Never Gonna Give You Up", channel: "Rick Astley", views: "1.4B views • 15 years ago", duration: "3:33", thumb: "https://img.youtube.com/vi/dQw4w9wgxcq/maxresdefault.jpg"}
    ];

    const grid = document.getElementById('videoGrid');

    videos.forEach(video => {
      const cardHTML = `
        <a href="video.html?id=${video.id}" class="video-card">
          <div class="thumbnail">
            <img src="${video.thumb}" alt="">
            <div class="duration">${video.duration}</div>
          </div>
          <div class="video-info">
            <div class="channel-img"></div>
            <div>
              <h5 class="video-title">${video.title}</h5>
              <p class="channel-name mb-1">${video.channel}</p>
              <p class="views">${video.views}</p>
            </div>
          </div>
        </a>
      `;
      grid.innerHTML += cardHTML;
    });
  </script>
</body>
</html>
