<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background: #0f0f0f;
  color: white;
}

/* VIDEO CARD */
.video-card {
  position: relative;
}

.video-card iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
}

/* PLAY ICON */
.play-icon {
  position: absolute;
  top: 40%;
  left: 45%;
  font-size: 40px;
  color: white;
  opacity: 0.8;
}

.video-card:hover .play-icon {
  opacity: 1;
}

/* TEXT */
.video-info {
  margin-top: 8px;
}

.channel {
  font-size: 13px;
  color: #aaa;
}

/* GRID */
.content {
  padding: 20px;
}

/* HOVER */
.video-card:hover {
  transform: scale(1.03);
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="container-fluid content">
  <div class="row g-4">

    <!-- VIDEO LOOP (30 videos) -->
    <!-- Repeat block -->
    
    <!-- JS will generate -->

  </div>
</div>

<script>
const row = document.querySelector(".row");

// sample youtube video IDs
const videos = [
"ysz5S6PUM-U","dQw4w9WgXcQ","3JZ_D3ELwOQ","L_jWHffIx5E","kXYiU_JCYtU",
"e-ORhEE9VVg","fLexgOxsZu0","hTWKbfoikeg","RgKAFK5djSk","60ItHLz5WEA"
];

// generate 30 videos
for(let i=0;i<30;i++){
  let vid = videos[i % videos.length];

  row.innerHTML += `
  <div class="col-lg-4 col-md-6 col-12">
    <div class="video-card">
      
      <iframe src="https://www.youtube.com/embed/${vid}" 
      frameborder="0" allowfullscreen></iframe>

      <div class="play-icon">
        <i class="fa fa-play-circle"></i>
      </div>

      <div class="video-info">
        <h6>Sample Video Title ${i+1}</h6>
        <div class="channel">Channel Name • ${Math.floor(Math.random()*10)}M views • ${Math.floor(Math.random()*5)+1} days ago</div>
      </div>

    </div>
  </div>
  `;
}
</script>

</body>
</html>
