<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Clone UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background-color: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  background-color: #0f0f0f;
  border-bottom: 1px solid #222;
  padding: 10px 20px;
}

/* Logo */
.logo {
  font-weight: bold;
  font-size: 20px;
}

/* SEARCH BAR */
.search-box {
  width: 50%;
  display: flex;
}

.search-box input {
  width: 100%;
  background: #121212;
  border: 1px solid #303030;
  color: white;
  padding: 8px;
  border-radius: 20px 0 0 20px;
}

.search-box button {
  background: #222;
  border: 1px solid #303030;
  color: white;
  padding: 8px 15px;
  border-radius: 0 20px 20px 0;
}

/* RIGHT ICONS */
.nav-icons i {
  margin-left: 20px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  left: -220px;
  top: 0;
  background-color: #0f0f0f;
  transition: 0.3s;
  z-index: 1000;
  border-right: 1px solid #222;
}

.sidebar.active {
  left: 0;
}

.sidebar li {
  padding: 12px 20px;
}

.sidebar li:hover {
  background-color: #272727;
  cursor: pointer;
}

/* CONTENT */
.content {
  margin-top: 70px;
  padding: 20px;
  transition: 0.3s;
}

.content.shift {
  margin-left: 220px;
}

/* CARDS */
.card {
  background-color: #181818;
  border: none;
  border-radius: 10px;
}

.card img {
  border-radius: 10px;
}

.text-muted {
  color: #aaa !important;
}

/* MOBILE */
@media(max-width:768px){
  .search-box {
    width: 60%;
  }
  .content.shift {
    margin-left: 0;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between align-items-center">

  <!-- LEFT -->
  <div class="d-flex align-items-center">
    <i class="fa-solid fa-bars fs-4" id="menuBtn"></i>
    <span class="logo ms-3">
      <i class="fa-brands fa-youtube text-danger"></i> YouTube
    </span>
  </div>

  <!-- CENTER -->
  <div class="search-box">
    <input type="text" placeholder="Search">
    <button><i class="fa-solid fa-magnifying-glass"></i></button>
  </div>

  <!-- RIGHT -->
  <div class="nav-icons">
    <i class="fa-solid fa-microphone"></i>
    <i class="fa-solid fa-bell"></i>
    <i class="fa-solid fa-user-circle"></i>
  </div>

</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <ul class="list-unstyled mt-4">
    <li>🏠 Home</li>
    <li>🎬 Shorts</li>
    <li>📺 Subscriptions</li>
    <li>📚 Library</li>
  </ul>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="row g-3">

    <div class="col-lg-4 col-md-6 col-12">
      <div class="card text-white">
        <img src="https://picsum.photos/400/200">
        <div class="card-body">
          <h6>Samay Raina - STILL ALIVE</h6>
          <p class="small text-muted">9M views • 19 hours ago</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <div class="card text-white">
        <img src="https://picsum.photos/401/200">
        <div class="card-body">
          <h6>University Tour</h6>
          <p class="small text-muted">8K views • 1 year ago</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <div class="card text-white">
        <img src="https://picsum.photos/402/200">
        <div class="card-body">
          <h6>Study Music</h6>
          <p class="small text-muted">12M views • 6 years ago</p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const content = document.querySelector(".content");

menuBtn.addEventListener("click", () => {
  sidebar.classList.toggle("active");
  content.classList.toggle("shift");
});
</script>

</body>
</html>
