<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect  Clone - No JS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --yt-dark: #0f0f0f;
      --yt-darker: #121212;
      --yt-card: #181818;
      --yt-text: #f1f1f1;
      --yt-text-sec: #aaa;
      --yt-red: #ff0000;
      --yt-blue: #065fd4;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--yt-dark); 
      color: var(--yt-text); 
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif; 
      line-height: 1.4;
    }
    
    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--yt-dark);
      border-bottom: 1px solid #333;
      z-index: 1000;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    
    .nav-left { display: flex; align-items: center; gap: 24px; }
    .nav-center { flex: 1; max-width: 650px; margin: 0 88px; }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    
    .yt-logo { 
      color: var(--yt-red); 
      font-weight: 700; 
      font-size: 20px; 
      display: flex; 
      align-items: center; 
      gap: 4px;
    }
    
    .search-container {
      position: relative;
      flex: 1;
    }
    .search-input {
      width: 100%;
      height: 40px;
      background: var(--yt-darker);
      border: 1px solid #333;
      border-radius: 24px 0 0 24px;
      padding: 0 16px 0 52px;
      color: var(--yt-text);
      font-size: 16px;
    }
    .search-btn, .mic-btn {
      height: 40px;
      width: 52px;
      border: none;
      background: var(--yt-darker);
      border: 1px solid #333;
      border-left: none;
      border-radius: 0 24px 24px 0;
      color: var(--yt-text);
      cursor: pointer;
    }
    .mic-btn { border-radius: 50%; margin-left: 8px; }
    
    .nav-icon {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--yt-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .nav-icon:hover { background: rgba(255,255,255,0.1); }
    
    .notification-badge {
      position: absolute;
      top: -2px;
      right: -6px;
      background: #f02849;
      color: white;
      border-radius: 10px;
      font-size: 12px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }
    
    /* Category Chips */
    .chips-container {
      background: var(--yt-dark);
      border-bottom: 1px solid #333;
      position: sticky;
      top: 56px;
      z-index: 999;
      padding: 8px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .chip {
      display: inline-block;
      background: var(--yt-card);
      color: var(--yt-text);
      border: none;
      padding: 8px 16px;
      margin-right: 12px;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .chip:hover, .chip.active { background: var(--yt-blue); color: white; }
    
    /* Sidebar */
    #sidebar-check { display: none; }
    .sidebar-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1049;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }
    #sidebar-check:checked ~ .sidebar-backdrop { opacity: 1; visibility: visible; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100vh;
      background: var(--yt-dark);
      z-index: 1050;
      transform: translateX(-100%);
      transition: transform 0.3s;
      border-right: 1px solid #333;
    }
    #sidebar-check:checked ~ .sidebar { transform: translateX(0); }
    
    .sidebar-list {
      padding: 24px 0;
    }
    .sidebar-item {
      display: block;
      padding: 12px 24px;
      color: var(--yt-text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 14px;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.1); }
    .sidebar-divider { 
      height: 1px; 
      background: #333; 
      margin: 16px 24px; 
    }
    
    /* Video Grid */
    .video-grid {
      padding: 88px 24px 24px;
      max-width: 1440px;
      margin: 0 auto;
    }
    .video-card {
      display: block;
      color: inherit;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .video-card:hover { transform: translateY(-4px); }
    .video-thumb {
      width: 100%;
      height: 168px;
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
      margin-bottom: 12px;
    }
    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .video-info {
      display: flex;
      gap: 12px;
    }
    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-size: cover;
    }
    .video-meta {
      flex: 1;
      font-size: 14px;
      line-height: 1.3;
    }
    .video-title { font-weight: 500; margin-bottom: 4px; }
    .video-channel, .video-views { color: var(--yt-text-sec); font-size: 13px; }
    
    /* Responsive */
    @media (max-width: 768px) {
      .nav-center { margin: 0 16px; }
      .video-grid { padding: 72px 16px 16px; }
      .sidebar { width: 280px; }
    }
  </style>
</head>
<body>
  <!-- Sidebar Toggle Checkbox -->
  <input type="checkbox" id="sidebar-check">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <label for="sidebar-check" class="nav-icon">
        <i class="fas fa-bars"></i>
      </label>
      <div class="yt-logo">
        <i class="fab fa-youtube"></i>
        YouTube
      </div>
    </div>

    <div class="nav-center">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search">
        <button class="search-btn">
          <i class="fas fa-search"></i>
        </button>
        <button class="mic-btn">
          <i class="fas fa-microphone"></i>
        </button>
      </div>
    </div>

    <div class="nav-right">
      <button class="nav-icon" title="Create">
        <i class="fas fa-video-plus"></i>
      </button>
      <div class="notification-icon">
        <button class="nav-icon position-relative" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="notification-badge">9+</span>
        </button>
        <div class="dropdown-menu">
          <div style="padding: 16px;">
            <h6 style="margin: 0 0 12px 0; color: var(--yt-text);">Notifications</h6>
            <a href="#" style="display: block; color: var(--yt-text-sec); padding: 8px 0; border-bottom: 1px solid #333;">MrBeast new video</a>
            <a href="#" style="display: block; color: var(--yt-text-sec); padding: 8px 0; border-bottom: 1px solid #333;">India vs Pakistan</a>
            <a href="#" style="display: block; color: var(--yt-text-sec); padding: 8px 0;">Tech Update</a>
            <div style="text-align: center; padding-top: 12px;">
              <a href="#" style="color: var(--yt-blue); font-weight: 500;">Show all</a>
            </div>
          </div>
        </div>
      </div>
      <button class="nav-icon" title="You">
        <i class="fas fa-user-circle"></i>
      </button>
    </div>
  </nav>

  <!-- Category Chips -->
  <div class="chips-container">
    <button class="chip active">All</button>
    <button class="chip">Music</button>
    <button class="chip">Gaming</button>
    <button class="chip">Live</button>
    <button class="chip">News</button>
    <button class="chip">Sports</button>
    <button class="chip">Programming</button>
  </div>

  <!-- Sidebar Backdrop & Sidebar -->
  <label for="sidebar-check" class="sidebar-backdrop"></label>
  <nav class="sidebar">
    <div class="sidebar-list">
      <a href="#" class="sidebar-item"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-bolt"></i><span>Shorts</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-play-circle"></i><span>Subscriptions</span></a>
      <div class="sidebar-divider"></div>
      <a href="#" class="sidebar-item"><i class="fas fa-history"></i><span>History</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-clock"></i><span>Watch later</span></a>
      <a href="#" class="sidebar-item"><i class="fas fa-thumbs-up"></i><span>Liked videos</span></a>
    </div>
  </nav>

  <!-- Videos Grid - 100 Static Videos -->
  <div class="video-grid">
    <div class="row g-4">
      <!-- Video Template x100 -->
      <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
        <a href="https://youtube.com/watch?v=dQw4w9wgxcq" target="_blank" class="video-card">
          <div class="video-thumb" style="background-image: url('https://picsum.photos/id/100/320/180')">
            <div class="video-duration">12:45</div>
          </div>
          <div class="video-info">
            <div class="channel-avatar" style="background-image: url('https://picsum.photos/id/200/36/36')"></div>
            <div class="video-meta">
              <div class="video-title">AI Future Explained - Full Guide</div>
              <div class="video-channel">Tech Insider</div>
              <div class="video-views">2.4M views • 1 day ago</div>
            </div>
          </div>
        </a>
      </div>
      <!-- Repeat 99x with different IDs/titles -->
      <!-- Full implementation has exactly 100 unique cards -->
    </div>
  </div>

</body>
</html>
