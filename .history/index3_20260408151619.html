<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background: #0f0f0f;
  color: white;
  margin: 0;
}

/* NAVBAR */
.navbar {
  background: #0f0f0f;
  border-bottom: 1px solid #222;
  padding: 10px 20px;
}

/* SEARCH */
.search-box {
  width: 45%;
  display: flex;
  align-items: center;
}

.search-box input {
  width: 100%;
  background: #121212;
  border: 1px solid #303030;
  color: white;
  padding: 8px;
  border-radius: 20px 0 0 20px;
}

.search-box button {
  background: #222;
  border: 1px solid #303030;
  color: white;
  padding: 8px 15px;
}

.mic {
  margin-left: 10px;
  background: #222;
  padding: 8px;
  border-radius: 50%;
}

/* ICON HOVER */
i:hover {
  background: #272727;
  border-radius: 50%;
  padding: 6px;
  cursor: pointer;
}

/* DP */
.dp {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: gray;
}

/* CATEGORY BAR */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  border-bottom: 1px solid #222;
}

.categories button {
  background: #272727;
  border: none;
  color: white;
  margin-right: 10px;
  padding: 6px 15px;
  border-radius: 20px;
}

.categories button.active {
  background: white;
  color: black;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  left: -220px;
  top: 0;
  background: #0f0f0f;
  transition: 0.3s;
  border-right: 1px solid #222;
  z-index: 1000;
}

.sidebar.active {
  left: 0;
}

.sidebar li {
  padding: 12px 20px;
}

.sidebar li:hover {
  background: #272727;
}

/* CONTENT */
.content {
  margin-top: 120px;
  padding: 20px;
  transition: 0.3s;
}

.content.shift {
  margin-left: 220px;
}

/* CARD */
.card {
  background: #181818;
  border: none;
  border-radius: 10px;
}

.text-muted {
  color: #aaa !important;
}

/* MOBILE */
@media(max-width:768px){
  .search-box {
    width: 60%;
  }
  .content.shift {
    margin-left: 0;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar d-flex justify-content-between align-items-center">

  <!-- LEFT -->
  <div class="d-flex align-items-center">
    <i class="fa-solid fa-bars fs-4" id="menuBtn"></i>
    <span class="ms-3 fw-bold">
      <i class="fa-brands fa-youtube text-danger"></i> YouTube
    </span>
  </div>

  <!-- CENTER -->
  <div class="search-box">
    <input type="text" placeholder="Search">
    <button><i class="fa fa-search"></i></button>
    <div class="mic">
      <i class="fa fa-microphone"></i>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="d-flex align-items-center">
    <i class="fa fa-bell me-3"></i>
    <div class="dp"></div>
  </div>

</nav>

<!-- CATEGORY BAR -->
<div class="categories">
  <button class="active">All</button>
  <button>Music</button>
  <button>Gaming</button>
  <button>Live</button>
  <button>News</button>
  <button>Sports</button>
  <button>Learning</button>
  <button>Podcasts</button>
  <button>AI</button>
  <button>Data Science</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <ul class="list-unstyled mt-4">
    <li>🏠 Home</li>
    <li>🎬 Shorts</li>
    <li>📺 Subscriptions</li>
    <hr>
    <li>🕒 History</li>
    <li>📂 Playlists</li>
    <li>⏱ Watch Later</li>
    <li>👍 Liked Videos</li>
  </ul>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="row g-3">

    <div class="col-lg-4 col-md-6 col-12">
      <div class="card p-2">
        <img src="https://picsum.photos/400/200">
        <div class="mt-2">
          <h6>Sample Video</h6>
          <p class="small text-muted">1M views • 1 day ago</p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
// TOGGLE SIDEBAR
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const content = document.querySelector(".content");

menuBtn.onclick = () => {
  sidebar.classList.toggle("active");
  content.classList.toggle("shift");
};

// CATEGORY ACTIVE
document.querySelectorAll(".categories button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  };
});
</script>

</body>
</html>
