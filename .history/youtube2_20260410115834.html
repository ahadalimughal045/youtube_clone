<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    body {
      background-color: #0f0f0f;
      color: #f1f1f1;
      font-family: 'Roboto', Arial, sans-serif;
    }

    .navbar {
      background-color: #0f0f0f;
      border-bottom: 1px solid #272727;
    }

    .search-bar {
      background: #121212;
      border: 1px solid #303030;
      color: #fff;
      height: 42px;
    }

    .search-bar:focus {
      border-color: #065fd4;
      box-shadow: 0 0 0 2px rgba(6, 95, 212, 0.4);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background-color: #272727;
    }

    .logo-red { color: #ff0000; }

    .thumbnail {
      height: 168px;
      background-size: cover;
      background-position: center;
      border-radius: 12px;
      position: relative;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .video-card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }

    .offcanvas {
      background-color: #0f0f0f;
      color: #fff;
      width: 260px !important;
    }

    .dropdown-menu {
      background-color: #1f1f1f;
      border: 1px solid #383838;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar fixed-top">
    <div class="container-fluid px-4">

      <div class="d-flex align-items-center gap-3">
        <button class="icon-btn fs-4" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="d-flex align-items-center gap-1 fs-4 fw-bold">
          <i class="fa-brands fa-youtube logo-red"></i> YouTube
        </div>
      </div>

      <!-- Search -->
      <div class="d-flex flex-grow-1 justify-content-center mx-5" style="max-width: 650px;">
        <div class="input-group" style="max-width: 580px;">
          <input type="text" class="form-control search-bar rounded-start-pill" placeholder="Search">
          <button class="btn btn-outline-secondary rounded-end-pill px-4">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
        <button class="icon-btn ms-2" title="Voice Search">
          <i class="fa-solid fa-microphone"></i>
        </button>
      </div>

      <!-- Right Icons -->
      <div class="d-flex align-items-center gap-2">
        <button class="icon-btn fs-5" title="Create">
          <i class="fa-solid fa-video"></i>
        </button>

        <!-- Bell Icon with Dropdown -->
        <button class="icon-btn fs-5 position-relative" data-bs-toggle="dropdown">
          <i class="fa-solid fa-bell"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">9+</span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end p-3" style="width: 380px;">
          <li><h6 class="dropdown-header">Notifications</h6></li>
          <li><a class="dropdown-item text-white py-2" href="#">New video from MrBeast</a></li>
          <li><a class="dropdown-item text-white py-2" href="#">Pakistan Cricket Highlights</a></li>
          <li><a class="dropdown-item text-white py-2" href="#">Tech news update</a></li>
          <li><hr></li>
          <li><a class="dropdown-item text-center text-primary" href="#">Show all</a></li>
        </ul>

        <button class="icon-btn fs-4" title="Account">
          <i class="fa-solid fa-user-circle"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Welcome -->
  <div class="text-center py-2 bg-black border-bottom text-white" style="margin-top: 56px;">
    Welcome to YouTube!
  </div>

  <!-- Sidebar -->
  <div class="offcanvas offcanvas-start" id="sidebarOffcanvas">
    <div class="offcanvas-body p-0">
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-house"></i> <span>Home</span>
      </a>
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-bolt"></i> <span>Shorts</span>
      </a>
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-play"></i> <span>Subscriptions</span>
      </a>
      <hr class="border-secondary mx-3">
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-clock-rotate-left"></i> <span>History</span>
      </a>
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-clock"></i> <span>Watch Later</span>
      </a>
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-thumbs-up"></i> <span>Liked Videos</span>
      </a>
      <a href="#" class="d-flex align-items-center gap-4 py-3 px-4 text-decoration-none text-white">
        <i class="fa-solid fa-download"></i> <span>Downloads</span>
      </a>
    </div>
  </div>

  <!-- Video Grid - 100 Videos -->
  <div class="container-fluid pt-4" style="margin-top: 70px;">
    <div class="row g-4" id="videoGrid"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 100 Videos Data
    const baseVideos = [
      {title: "The Future of AI in 2026", channel: "Tech Insider", views: "2.4M views • 2 days ago", thumbId: 1015, duration: "12:45", youtubeId: "dQw4w9wgxcq"},
      {title: "Building YouTube Clone Step by Step", channel: "Web Dev Simplified", views: "1.1M views • 1 week ago", thumbId: 201, duration: "28:10", youtubeId: "3JZ_D3ELwOQ"},
      {title: "JavaScript in 2026 - New Features", channel: "freeCodeCamp", views: "3.8M views • 3 days ago", thumbId: 237, duration: "45:22", youtubeId: "PkZNo7MFNFg"},
      {title: "Karachi Street Food Tour", channel: "Food With Ahad", views: "892K views • 12 hours ago", thumbId: 870, duration: "18:33", youtubeId: "9i6b0vJ8i8Q"},
    ];

    const grid = document.getElementById("videoGrid");

    for (let i = 0; i < 100; i++) {
      const v = baseVideos[i % baseVideos.length];
      const cardHTML = `
        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12">
          <div class="video-card" onclick="window.open('https://www.youtube.com/watch?v=${v.youtubeId}', '_blank')">
            <div class="thumbnail" style="background-image: url('https://picsum.photos/id/${v.thumbId + (i % 50)}/320/180')">
              <div class="duration">${v.duration}</div>
            </div>
            <div class="d-flex gap-3 mt-3">
              <img src="https://picsum.photos/id/${v.thumbId + 100}/36/36" class="rounded-circle" width="36" height="36">
              <div class="flex-grow-1">
                <div style="font-size:15px; line-height:1.35;">${v.title} ${i % 5 === 0 ? '(Updated)' : ''}</div>
                <div class="text-secondary small">${v.channel}</div>
                <div class="text-secondary small">${v.views}</div>
              </div>
            </div>
          </div>
        </div>
      `;
      grid.innerHTML += cardHTML;
    }
  </script>
</body>
</html>
